version: '3.9'

services:
  # ── API Backend ───────────────────────────────────────────────────────────────
  # PostgreSQL ya no se levanta localmente — se usa Supabase
  api:
    build: .
    container_name: autotaller_api
    restart: unless-stopped
    env_file: .env          # lee DATABASE_URL y el resto desde tu .env
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src      # hot reload en desarrollo
      - ./uploads:/app/uploads
